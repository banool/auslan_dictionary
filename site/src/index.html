		<style>
			/* Hearth theme: a warm clay-and-cream re-skin of the stock template,
			   using the app's typefaces (Bricolage Grotesque for display, Hanken
			   Grotesk for body) so the site matches the app's redesign. */
			html, body {
				background-color: #FBF5EE;
				font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
			}

			#header {
				background-color: #FBF5EE !important;
				background-image: none !important;
				color: #2A201A;
			}
			#header .content h1,
			#header .content h1 a {
				color: #2A201A;
				border-bottom: 0;
				font-family: 'Bricolage Grotesque', 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
				font-weight: 700;
				letter-spacing: -0.01em;
			}
			#header .content p {
				color: #6F6155;
				font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
			}

			/* Store + GitHub buttons become clay (the Hearth primary). */
			#header .button.special {
				background-color: #BF5C36 !important;
				color: #FFFFFF !important;
				box-shadow: none !important;
				font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
				font-weight: 700;
			}
			#header .button.special:hover { background-color: #A94E2C !important; }
			#header .button.special:active { background-color: #8F3F22 !important; }

			/* Render the screenshot inside a realistic iPhone device frame:
			   a dark titanium bezel with large, concentric rounded corners. The
			   screenshot is a full app screen captured from the simulator, so it
			   already carries the iOS status bar + Dynamic Island — the notch
			   reads naturally with no extra chrome. (Replaces the template's
			   generic CSS wireframe phone.) */
			#header .image.phone:before,
			#header .image.phone:after,
			#header .image.phone .inner:before,
			#header .image.phone .inner:after { display: none !important; }
			#header .image.phone {
				width: 14.5em;
				border-radius: 0 !important;
				overflow: visible !important;
			}
			#header .image.phone .inner {
				border: 0 !important;
				background: #1c1b1d;
				border-radius: 3em;
				padding: 0.5em;
				box-shadow: 0 26px 64px rgba(42, 32, 26, 0.32),
				            inset 0 0 0 1.5px rgba(255, 255, 255, 0.07);
			}
			#header .image.phone .inner img {
				display: block;
				width: 100%;
				border-radius: 2.5em;
			}
		</style>

			<header id="header">
