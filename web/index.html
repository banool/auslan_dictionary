<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Free video dictionary for Australian Sign Language (Auslan).">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Auslan Dictionary">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Auslan Dictionary</title>
  <link rel="manifest" href="manifest.json">

  <!-- Boot/loading screen shown until Flutter's first frame renders over it.
       Lives here (HTML) rather than as an early runApp() so it never touches
       the initial route or document title — see lib/main.dart. -->
  <style>
    body { margin: 0; }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FBF5EE;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #loading .title {
      color: #2A201A;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 24px;
    }
    #loading .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid #e7d8c9;
      border-top-color: #bf5c36;
      border-radius: 50%;
      animation: loading-spin 0.8s linear infinite;
    }
    @keyframes loading-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="title">Auslan Dictionary</div>
    <div class="spinner"></div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
