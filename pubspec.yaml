name: auslan_dictionary
description: Free video dictionary of Auslan signs

publish_to: 'none'

version: 1.19.45+863

environment:
  sdk: '>=2.18.0 <3.0.0'

dependencies:
  flutter:
    sdk: flutter
  device_info_plus:
  dictionarylib:
    git:
      url: https://github.com/banool/dictionarylib.git
      ref: d8ba2ed930aaa247c352c90c2bd3fe8805eab5c8
  dolphinsr_dart:
    git:
      url: https://github.com/banool/dolphhinsr_dart.git
      ref: master
  flutter_native_splash:
  go_router:
  http:
  shared_preferences:
  url_launcher:
  media_kit:

dev_dependencies:
  dependency_validator:
  flutter_driver:
    sdk: flutter
  flutter_launcher_icons:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints:

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/02-okay-512.png"

flutter_native_splash:
  color: "#FBF5EE"
  color_dark: "#191310"
  image: "assets/icon/01-okay.png"
  # Android 12+ takes its splash background from this block, not the top-level
  # color (flutter_native_splash 2.4.x only flows color/color_dark into the
  # values-v31 styles when an android_12 section is present).
  android_12:
    color: "#FBF5EE"
    color_dark: "#191310"

flutter:
  uses-material-design: true
