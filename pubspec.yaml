name: auslan_dictionary
description: Free video dictionary of Auslan signs

publish_to: 'none'

version: 2.0.47+958

environment:
  sdk: '>=3.2.3 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  # usePathUrlStrategy() in main.dart for clean web URLs (no-op on mobile).
  flutter_web_plugins:
    sdk: flutter
  device_info_plus:
  dictionarylib:
    # path: ../dictionarylib
    git:
      url: https://github.com/banool/dictionarylib.git
      # NOTE: keep this ref and dictionarylib_test_support's ref (below, in
      # dev_dependencies) on the SAME commit when repinning.
      ref: c8fb9747fe6a016b592a1db7ac72d0f446c345d0
  dolphinsr_dart:
    git:
      url: https://github.com/banool/dolphhinsr_dart.git
      # Pinned to a commit (not a branch) so lock regeneration can't
      # silently advance it.
      ref: 016df21ffc2496df5a3d2042a503f72f5b6bdc00
  flutter_native_splash:
  go_router:
  http:
  shared_preferences:
  url_launcher:
  media_kit:

dev_dependencies:
  # The shared integration-test suites. Same repo as dictionarylib — pin the
  # ref to the SAME commit as the dictionarylib dependency above.
  dictionarylib_test_support:
    git:
      url: https://github.com/banool/dictionarylib.git
      ref: c8fb9747fe6a016b592a1db7ac72d0f446c345d0
      path: dictionarylib_test_support
  dependency_validator:
  flutter_driver:
    sdk: flutter
  flutter_launcher_icons:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints:

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/02-okay-512.png"

flutter_native_splash:
  color: "#FBF5EE"
  color_dark: "#191310"
  # Transparent-background variants of the logo (the original 01-okay.png has
  # an opaque white box that clashes with the Hearth splash colours): black
  # hands for the light splash, white hands for the dark one. Derived from
  # 01-okay.png.
  image: "assets/icon/01-okay-splash.png"
  image_dark: "assets/icon/01-okay-splash-dark.png"
  # Android 12+ takes its splash background from this block, not the top-level
  # color (flutter_native_splash 2.4.x only flows color/color_dark into the
  # values-v31 styles when an android_12 section is present). The icon variants
  # are pre-fitted to the 1152px canvas with the logo inside the 768px circle
  # mask Android 12 applies.
  android_12:
    color: "#FBF5EE"
    color_dark: "#191310"
    image: "assets/icon/01-okay-splash-android12.png"
    image_dark: "assets/icon/01-okay-splash-android12-dark.png"

flutter:
  uses-material-design: true
  # MSAL Android config for Microsoft sign-in (msal_auth). The plugin reads
  # this at app-creation time; client_id + redirect_uri are injected from
  # SharingAuthConfig, so they're absent here. See
  # the private backend repo's MANUAL_SETUP.md section 4.
  assets:
    - assets/msal_config.json
