name: Deploy site to Cloudflare Pages

# The deploy itself is a reusable workflow in the dictionarylib repo
# (app-pages-deploy.yaml); this is the thin Auslan-specific caller.

on:
  push:
    branches: [master]
    paths: ['site/**', '.github/workflows/pages.yaml']
  workflow_dispatch:

# Single deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    uses: banool/dictionarylib/.github/workflows/app-pages-deploy.yaml@main
    with:
      project_name: auslan-dictionary
      production_branch: master
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
