name: CI

on:
  push:
    branches: [ master ]
  pull_request:
  # For smoke-testing the release jobs without a qualifying push (they are
  # path-gated on push, dispatch bypasses the filter).
  workflow_dispatch:

# A newer push supersedes any in-flight run for the same ref — cancel it
# rather than burning minutes finishing a build nobody will ship. Every commit
# has a fresh build number (pre-commit bump), so a cancelled upload just means
# a skipped number, which the stores are fine with.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Always-on formatting gate (runs on every push/PR, unlike the
  # path-gated jobs below). The job body is a reusable workflow in the
  # appci repo.
  format:
    uses: banool/appci/.github/workflows/app-format.yaml@main

  # Check which files / paths have changed. We use this to inform whether we
  # should run later jobs — only build/release the app if the app itself has
  # changed, not the app data (since we don't bundle that into the app
  # anymore).
  changes:
    outputs:
      android: ${{ steps.filter.outputs.android }}
      ios: ${{ steps.filter.outputs.ios }}
      data: ${{ steps.filter.outputs.data }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v2
      id: filter
      with:
        filters: '.github/filters.yml'
    - name: Print changes
      run: printf "Android files changed $ANDROID\niOS files changed $IOS\nData files changed $DATA\n"
      env:
        ANDROID: ${{ steps.filter.outputs.android }}
        IOS: ${{ steps.filter.outputs.ios }}
        DATA: ${{ steps.filter.outputs.data }}

  # Test (always, when the app or data changed), and — only for android-change
  # pushes — build the signed appbundle and upload it to the Play internal
  # track. The job body is a reusable workflow in the appci repo; the
  # `upload` expression preserves the old build_android semantics exactly
  # (tests run on PRs and data-only changes; build/upload only on
  # android-change pushes).
  release_android:
    needs: [changes]
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.data == 'true'
    uses: banool/appci/.github/workflows/app-release-android.yaml@main
    with:
      package_name: com.banool.auslan_dictionary
      upload: ${{ needs.changes.outputs.android == 'true' && github.event_name == 'push' }}
    secrets:
      UPLOAD_KEYSTORE: ${{ secrets.UPLOAD_KEYSTORE }}
      KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
      ANDROID_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}

  # Build and upload an internal TestFlight build on app-change pushes, the
  # iOS counterpart of release_android. No test-only mode: a macOS runner adds
  # nothing on PRs (flutter test already runs in release_android), so this
  # only runs when it will actually upload.
  release_ios:
    needs: [changes]
    if: github.event_name == 'workflow_dispatch' || (needs.changes.outputs.ios == 'true' && github.event_name == 'push')
    uses: banool/appci/.github/workflows/app-release-ios.yaml@main
    with:
      team_id: 9N3SNHTGL7
    secrets:
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}

  # Auslan-specific: attach a signed APK to the rolling "latest" GitHub
  # release. (The Play appbundle is handled by release_android above; this
  # stays here because the other app doesn't publish an APK.)
  release_apk:
    # Rewriting the "latest" tag + release assets needs write access — the
    # default GITHUB_TOKEN is read-only.
    permissions:
      contents: write
    needs: [changes]
    if: needs.changes.outputs.android == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - run: echo "${{ secrets.UPLOAD_KEYSTORE }}" | base64 -d > android/upload_keystore.jks
    - run: echo "${{ secrets.KEY_PROPERTIES }}" | base64 -d > android/key.properties

    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.5'
        channel: stable
        cache: true

    - run: flutter pub get

    # Build apk. This will be signed.
    - run: flutter build apk

    # Publish apk to Github Packages
    - uses: marvinpinto/action-automatic-releases@919008cf3f741b179569b7a6fb4d8860689ab7f0
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest"
        prerelease: false
        title: "Latest apk build"
        files: build/app/outputs/flutter-apk/app-release.apk

  # Mirror the data files to the Cloudflare R2 bucket, served at
  # cdn.auslandictionary.org/data/... — the app's secondary fallback for the
  # data files when GitHub raw is unavailable (see entries_loader.dart). This
  # replaced the old Google Cloud Storage bucket. data-v2.json is what current
  # builds read; data.json is the legacy v1 file still read by old builds;
  # latest_version is the version marker — all three must be mirrored or the
  # fallback is dead for those clients.
  mirror-to-r2:
    needs: [changes]
    # Only mirror data from merged commits on master, never from PR branches.
    # Without the push guard, opening a data-update PR would overwrite the
    # mirror with unvetted, unmerged data (it triggers on pull_request too).
    if: needs.changes.outputs.data == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # R2 S3-compatible API credentials (an R2 API token scoped to this
      # bucket). AWS_DEFAULT_REGION must be "auto" for R2.
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
      # aws-cli v2 adds request checksums R2 can reject; only send them when the
      # operation actually requires them.
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
    steps:
      - uses: actions/checkout@v4

      - name: Upload data files to R2
        run: |
          set -euo pipefail
          for f in data.json data-v2.json latest_version; do
            aws s3 cp "assets/data/$f" "s3://auslan-mirror/data/$f" \
              --endpoint-url "$R2_ENDPOINT" \
              --cache-control "public, max-age=300"
          done
