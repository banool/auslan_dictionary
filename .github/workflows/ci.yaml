name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  # Always-on formatting gate (runs on every push/PR, unlike the
  # path-gated jobs below). The job body is a reusable workflow in the
  # dictionarylib repo.
  format:
    uses: banool/dictionarylib/.github/workflows/app-format.yaml@main

  # Check which files / paths have changed. We use this to inform whether we
  # should run later jobs — only build/release the app if the app itself has
  # changed, not the app data (since we don't bundle that into the app
  # anymore).
  changes:
    outputs:
      android: ${{ steps.filter.outputs.android }}
      data: ${{ steps.filter.outputs.data }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v2
      id: filter
      with:
        filters: '.github/filters.yml'
    - name: Print changes
      run: printf "Android files changed $ANDROID\Data files changed $DATA\n"
      env:
        ANDROID: ${{ steps.filter.outputs.android }}
        DATA: ${{ steps.filter.outputs.data }}

  # Test (always, when the app or data changed), and — only for android-change
  # pushes — build the signed appbundle and upload it to the Play internal
  # track. The job body is a reusable workflow in the dictionarylib repo; the
  # `publish` expression preserves the old build_android semantics exactly
  # (tests run on PRs and data-only changes; build/upload only on
  # android-change pushes).
  release_android:
    needs: [changes]
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.data == 'true'
    uses: banool/dictionarylib/.github/workflows/app-release-android.yaml@main
    with:
      package_name: com.banool.auslan_dictionary
      upload: ${{ needs.changes.outputs.android == 'true' && github.event_name == 'push' }}
    secrets:
      UPLOAD_KEYSTORE: ${{ secrets.UPLOAD_KEYSTORE }}
      KEY_PROPERTIES: ${{ secrets.KEY_PROPERTIES }}
      ANDROID_SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}

  # Auslan-specific: attach a signed APK to the rolling "latest" GitHub
  # release. (The Play appbundle is handled by release_android above; this
  # stays here because the other app doesn't publish an APK.)
  release_apk:
    # Rewriting the "latest" tag + release assets needs write access — the
    # default GITHUB_TOKEN is read-only.
    permissions:
      contents: write
    needs: [changes]
    if: needs.changes.outputs.android == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - run: echo "${{ secrets.UPLOAD_KEYSTORE }}" | base64 -d > android/upload_keystore.jks
    - run: echo "${{ secrets.KEY_PROPERTIES }}" | base64 -d > android/key.properties

    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.5'
        channel: stable
        cache: true

    - run: flutter pub get

    # Build apk. This will be signed.
    - run: flutter build apk

    # Publish apk to Github Packages
    - uses: marvinpinto/action-automatic-releases@919008cf3f741b179569b7a6fb4d8860689ab7f0
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest"
        prerelease: false
        title: "Latest apk build"
        files: build/app/outputs/flutter-apk/app-release.apk

  upload-to-gcs:
    permissions:
      contents: 'read'
      id-token: 'write'
    needs: [changes]
    # Only mirror data from merged commits on master, never from PR branches.
    # Without the push guard, opening a data-update PR would overwrite the
    # mirror with unvetted, unmerged data (it triggers on pull_request too).
    if: needs.changes.outputs.data == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Copy the target files elsewhere. data-v2.json is what current app
      # builds read (see entries_loader.dart); data.json is the legacy v1 file
      # still read by old builds. Both must be mirrored or the GCS fallback is
      # dead for current clients.
      - run: mkdir -p tmp
      - run: cp assets/data/data.json assets/data/data-v2.json assets/data/latest_version tmp

      - uses: 'google-github-actions/auth@v2'
        with:
          project_id: 'auslan-dictionary'
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - uses: 'google-github-actions/upload-cloud-storage@v2'
        with:
          path: tmp
          destination: 'auslan-media-bucket/sync'
          parent: false
