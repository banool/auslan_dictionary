name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  # Always-on formatting gate (runs on every push/PR, unlike the
  # path-gated build below).
  format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: subosito/flutter-action@v1
      with:
        flutter-version: '3.44.2'
        channel: stable
    # `dart format` derives its style from the package's language version
    # (the pubspec sdk lower bound), so it needs the package resolved first —
    # without pub get it falls back to the latest style and reformats
    # everything.
    - run: flutter pub get
    - run: dart format --output=none --set-exit-if-changed lib test integration_test test_driver

  # Check which files / paths have changed. We use this to inform whether we should run
  # later jobs. Even though there is only a single job for now (build_android) we only
  # want to run it if the app itself has changed, not the app data (since we don't
  # bundle that in to the app anymore).
  changes:
    outputs:
      android: ${{ steps.filter.outputs.android }}
      data: ${{ steps.filter.outputs.data }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v2
      id: filter
      with:
        filters: '.github/filters.yml'
    - name: Print changes
      run: printf "Android files changed $ANDROID\Data files changed $DATA\n"
      env:
        ANDROID: ${{ steps.filter.outputs.android }}
        DATA: ${{ steps.filter.outputs.data }}

  build_android:
    # The release step rewrites the "latest" tag + release assets, which
    # needs write access — the default GITHUB_TOKEN is read-only.
    permissions:
      contents: write
    needs: [changes]
    if: needs.changes.outputs.android == 'true' || needs.changes.outputs.data == 'true'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - run: echo "${{ secrets.UPLOAD_KEYSTORE }}" | base64 -d > android/upload_keystore.jks
    - run: echo "${{ secrets.KEY_PROPERTIES }}" | base64 -d > android/key.properties

    - uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '21'

    - uses: subosito/flutter-action@v1
      with:
        flutter-version: '3.44.2'
        channel: stable

    # Initial build and test.
    - run: flutter pub get

    # Run tests.
    - run: flutter test

    # Build apk. This will be signed.
    - run: flutter build apk
      if: needs.changes.outputs.android == 'true' && github.event_name == 'push'

    # Publish apk to Github Packages
    - uses: marvinpinto/action-automatic-releases@919008cf3f741b179569b7a6fb4d8860689ab7f0
      if: needs.changes.outputs.android == 'true' && github.event_name == 'push'
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        automatic_release_tag: "latest"
        prerelease: false
        title: "Latest apk build"
        files: build/app/outputs/flutter-apk/app-release.apk

    # Build appbundle. This will be signed.
    - run: flutter build appbundle
      if: needs.changes.outputs.android == 'true' && github.event_name == 'push'

    # Publish appbundle to the store.
    - name: Publish Android build to internal track
      uses: r0adkll/upload-google-play@v1.0.15
      if: needs.changes.outputs.android == 'true' && github.event_name == 'push'
      with:
        serviceAccountJsonPlainText: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
        packageName: com.banool.auslan_dictionary
        releaseFile: build/app/outputs/bundle/release/app-release.aab
        track: internal

  upload-to-gcs:
    permissions:
      contents: 'read'
      id-token: 'write'
    needs: [changes]
    # Only mirror data from merged commits on master, never from PR branches.
    # Without the push guard, opening a data-update PR would overwrite the
    # mirror with unvetted, unmerged data (it triggers on pull_request too).
    if: needs.changes.outputs.data == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Copy the target files elsewhere. data-v2.json is what current app
      # builds read (see entries_loader.dart); data.json is the legacy v1 file
      # still read by old builds. Both must be mirrored or the GCS fallback is
      # dead for current clients.
      - run: mkdir -p tmp
      - run: cp assets/data/data.json assets/data/data-v2.json assets/data/latest_version tmp

      - uses: 'google-github-actions/auth@v2'
        with:
          project_id: 'auslan-dictionary'
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - uses: 'google-github-actions/upload-cloud-storage@v2'
        with:
          path: tmp
          destination: 'auslan-media-bucket/sync'
          parent: false

