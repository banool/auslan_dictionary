name: Deploy web app to Cloudflare Pages

# The deploy itself is a reusable workflow in the appci repo
# (app-web-deploy.yaml); this is the thin Auslan-specific caller.

on:
  push:
    branches: [master]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/web.yaml'
  workflow_dispatch:

# A newer push supersedes any in-flight deploy — cancel it.
concurrency:
  group: web
  cancel-in-progress: true

jobs:
  deploy:
    uses: banool/appci/.github/workflows/app-web-deploy.yaml@main
    with:
      project_name: auslan-web
      production_branch: master
    secrets:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
